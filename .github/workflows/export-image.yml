name: Build Kafka 3.3.2 ARM64 Offline Image
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 Kafka image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/arm64 # 强制构建ARM64架构
          tags: 10.144.4.20:85/lib/apache_kafka:3.3.2-arm64

      - name: Export image to tar file
        run: |
          docker save -o apache_kafka_3.3.2_arm64_offline.tar 10.144.4.20:85/lib/apache_kafka:3.3.2-arm64
          ls -lh apache_kafka_3.3.2_arm64_offline.tar

      - name: Upload image as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: apache_kafka_3.3.2_arm64_offline
          path: apache_kafka_3.3.2_arm64_offline.tar
          retention-days: 30
