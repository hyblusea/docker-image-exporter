name: Build Kafka 3.3.2 Offline Image
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Kafka image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # 绝对不推送
          load: true # 加载到本地 Docker
          tags: 10.144.4.20:85/lib/apache_kafka:3.3.2 # 保留你的 Harbor 标签，导入后直接用

      - name: Export image to tar file
        run: |
          docker save -o apache_kafka_3.3.2_offline.tar 10.144.4.20:85/lib/apache_kafka:3.3.2
          ls -lh apache_kafka_3.3.2_offline.tar

      - name: Upload image as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: apache_kafka_3.3.2_offline
          path: apache_kafka_3.3.2_offline.tar
          retention-days: 30 # 保留30天
