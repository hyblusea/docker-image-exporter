name: Build and Extract Reporter JAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image to extract JARs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.reporter
          load: true
          tags: reporter-extract:latest

      - name: Extract JARs from image
        run: |
          # 创建容器并复制 JAR 出来
          docker create --name extractor reporter-extract:latest
          docker cp extractor:/output ./reporter-jars
          docker rm extractor
          echo ">>> 提取的 JAR:"
          ls -la ./reporter-jars/

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporter-jars
          path: ./reporter-jars/
          retention-days: 7
